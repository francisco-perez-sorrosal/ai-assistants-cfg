[importlinter]
root_packages =
    scripts

[importlinter:contract:check-scripts-precondition-boundary]
name = check_* (pre-commit) scripts must not import finalize_* (post-merge) scripts
type = forbidden
description = Pre-commit-time and post-merge-time scripts run in disjoint execution phases; one importing from the other would couple gates. CLAUDE.md§Structural Beauty: clean boundaries, cohesive modules.
source_modules =
    scripts.check_id_citation_discipline
    scripts.check_shipped_artifact_isolation
    scripts.check_squash_safety
forbidden_modules =
    scripts.finalize_adrs
    scripts.finalize_tech_debt_ledger
