# Starter: AI Model Serving with Ollama + API Gateway
# Usage: Copy to your project root as compose.yaml, then customize.
#
# Assumes:
#   - NVIDIA GPU available (Linux with nvidia-docker, or native)
#   - API application that calls Ollama for inference
#   - PostgreSQL for application data
#
# For macOS: Remove the deploy.resources.reservations.devices section
# and run Ollama as a native binary instead (Docker on macOS lacks GPU passthrough).

services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/app"
      OLLAMA_URL: "http://ollama:11434"
    env_file: [.env]
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore: [__pycache__/]
        - action: rebuild
          path: ./requirements.txt
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.6
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    ports: ["11434:11434"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # Optional: Web UI for chatting with models
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    profiles: ["ui"]
    ports: ["3000:8080"]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - webui_data:/app/backend/data

volumes:
  ollama_data:
  pgdata:
  webui_data:
